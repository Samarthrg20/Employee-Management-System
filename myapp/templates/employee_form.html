{% extends 'base.html' %}

{% block content %}

<div class="card p-4">

    <h3>{% if employee %}Edit{% else %}Add{% endif %} Employee</h3>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" class="form-control"
                   value="{{ employee.name|default:'' }}">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control"
                   value="{{ employee.email|default:'' }}">
        </div>

        <div class="mb-3">
            <label>Age</label>
            <input type="number" name="age" class="form-control"
                   value="{{ employee.age|default:'' }}">
        </div>

        <button class="btn btn-success">Save</button>
        <a href="{% url 'employee_list' %}" class="btn btn-secondary">Cancel</a>

    </form>

</div>

{% endblock %}
