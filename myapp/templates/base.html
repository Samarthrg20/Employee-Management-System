<!DOCTYPE html>
<html>
<head>
    <title>Employee Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f1f5f9;
        }

        .sidebar {
            height: 100vh;
            background: linear-gradient(180deg, #1e293b, #0f172a);
            color: white;
            padding: 20px;
        }

        .sidebar a {
            color: #cbd5f5;
            display: block;
            margin: 10px 0;
            text-decoration: none;
        }

        .sidebar a:hover {
            color: white;
        }

        .card {
            border-radius: 15px;
            border: none;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        .stat-card {
            color: white;
            border-radius: 15px;
        }

        .bg-gradient-1 { background: linear-gradient(45deg, #3b82f6, #6366f1); }
        .bg-gradient-2 { background: linear-gradient(45deg, #10b981, #059669); }
        .bg-gradient-3 { background: linear-gradient(45deg, #f59e0b, #d97706); }

    </style>
</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar col-2">
        <h4>⚡ EMS</h4>
        <hr>

        <a href="#"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="{% url 'employee_list' %}"><i class="bi bi-people"></i> Employees</a>
    </div>

    <!-- Main Content -->
    <div class="col-10 p-4">

        <!-- Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}

    </div>

</div>

</body>
</html>
