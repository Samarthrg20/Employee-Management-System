{% extends 'base.html' %}

{% block content %}

<div class="card p-4 text-center">

    <h3>Delete Employee</h3>
    <p>Are you sure?</p>

    <h5 class="text-danger">{{ employee.name }}</h5>

    <form method="POST">
        {% csrf_token %}
        <button class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'employee_list' %}" class="btn btn-secondary">Cancel</a>
    </form>

</div>

{% endblock %}
